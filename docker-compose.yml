version: "3.8"

# the services part
services:
#mariadb
  mariadb:
    image: mariadb:user
    container_name: mariadb
    build: ./mariadb
    volumes:
      - mariadb:/var/lib/mysql
    env_file :
      - .env
    networks :
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-zv", "mariadb", "3306"]
      interval: 1s
      timeout: 5s
      retries: 10
#CMD: This specifies the command to run inside the container for the health check.
#nc (netcat): This is a utility used for networking. In this case, it’s used to check if a particular port is open and listening.
#-z: Performs a “zero I/O mode” scan, essentially asking if the port is open without sending any actual data.
#-v: Provides verbose output, which shows the connection attempts and results.
#mariadb: The hostname of the MariaDB service.
#3306: The port number for MariaDB. This checks if the MariaDB service is up and listening on port 3306.
#nginx
  nginx:
    image: nginx:user
    container_name: nginx
    build: ./nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    restart: always
#wordpress
  wordpress:
    image: wordpress:user
    container_name: wordpress
    build: ./wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/wordpress
    env_file :
      - .env
    networks:
      - inception
    restart: always

# the volumes part
volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      device: ./data/mariadb
      o : bind
      type : none
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      device: ./data/wordpress
      o : bind
      type : none

# the networks part
networks:
  inception:
    name: inception